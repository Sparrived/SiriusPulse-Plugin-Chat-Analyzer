<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
<style>

/* ═══ RESET ═══ */
*{margin:0;padding:0;box-sizing:border-box;}

/* ═══ PALETTE — 深空色板 ═══ */
:root{
  --bg:#0e0e1c;
  --surface:#1a1a30;
  --surface-2:#1e1e38;
  --surface-3:#242444;
  --primary:#9d7cff;
  --primary-soft:rgba(157,124,255,0.12);
  --primary-glow:rgba(157,124,255,0.35);
  --primary-dim:rgba(157,124,255,0.06);
  --pink:#ff7eb5;
  --pink-soft:rgba(255,126,181,0.1);
  --pink-glow:rgba(255,126,181,0.25);
  --mint:#6ee8b0;
  --mint-soft:rgba(110,232,176,0.1);
  --mint-glow:rgba(110,232,176,0.25);
  --gold:#ffc857;
  --gold-soft:rgba(255,200,87,0.1);
  --text:#e4e4f0;
  --text-dim:#9898c0;
  --text-muted:#5c5c80;
  --border:rgba(157,124,255,0.07);
  --border-primary:rgba(157,124,255,0.18);
  --border-pink:rgba(255,126,181,0.15);
  --sans:'LXGW WenKai','Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;
  --cn:'LXGW WenKai','Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;
}

/* ═══ BODY — 深空 ═══ */
body{
  font-family:var(--sans);
  background:
    radial-gradient(ellipse 900px 600px at 20% 25%,rgba(157,124,255,0.06) 0%,transparent 100%),
    radial-gradient(ellipse 700px 700px at 80% 15%,rgba(255,126,181,0.04) 0%,transparent 100%),
    radial-gradient(ellipse 600px 400px at 50% 85%,rgba(110,232,176,0.035) 0%,transparent 100%),
    linear-gradient(175deg,#08081a 0%,#12122a 35%,#10102a 65%,#0e0e26 100%);
  color:var(--text);
  padding:0;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
  font-size:13px;
  line-height:1.7;
}

/* ═══ 星星背景 ═══ */
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:
    radial-gradient(ellipse 500px 150px at 22% 12%,rgba(157,124,255,0.05) 0%,transparent 100%),
    radial-gradient(ellipse 350px 100px at 72% 50%,rgba(255,126,181,0.035) 0%,transparent 100%),
    radial-gradient(circle 2px at 4% 7%,rgba(157,124,255,0.8) 0%,transparent 100%),
    radial-gradient(circle 1px at 9% 20%,rgba(255,255,255,0.55) 0%,transparent 100%),
    radial-gradient(circle 1.2px at 14% 4%,rgba(255,126,181,0.65) 0%,transparent 100%),
    radial-gradient(circle 0.7px at 19% 33%,rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(circle 2.2px at 24% 13%,rgba(157,124,255,0.55) 0%,transparent 100%),
    radial-gradient(circle 1px at 29% 28%,rgba(110,232,176,0.45) 0%,transparent 100%),
    radial-gradient(circle 1.4px at 34% 2%,rgba(255,255,255,0.65) 0%,transparent 100%),
    radial-gradient(circle 0.8px at 39% 24%,rgba(255,126,181,0.4) 0%,transparent 100%),
    radial-gradient(circle 1.8px at 44% 11%,rgba(157,124,255,0.6) 0%,transparent 100%),
    radial-gradient(circle 0.7px at 49% 38%,rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(circle 1.2px at 54% 5%,rgba(110,232,176,0.55) 0%,transparent 100%),
    radial-gradient(circle 1px at 59% 26%,rgba(157,124,255,0.45) 0%,transparent 100%),
    radial-gradient(circle 1.5px at 64% 7%,rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(circle 0.8px at 69% 30%,rgba(255,126,181,0.5) 0%,transparent 100%),
    radial-gradient(circle 1.4px at 74% 16%,rgba(157,124,255,0.6) 0%,transparent 100%),
    radial-gradient(circle 0.9px at 79% 2%,rgba(255,255,255,0.45) 0%,transparent 100%),
    radial-gradient(circle 1.8px at 84% 22%,rgba(110,232,176,0.55) 0%,transparent 100%),
    radial-gradient(circle 0.7px at 89% 9%,rgba(157,124,255,0.4) 0%,transparent 100%),
    radial-gradient(circle 1.1px at 94% 28%,rgba(255,126,181,0.45) 0%,transparent 100%),
    radial-gradient(circle 1px at 2% 52%,rgba(157,124,255,0.5) 0%,transparent 100%),
    radial-gradient(circle 0.8px at 11% 68%,rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(circle 1.2px at 24% 58%,rgba(255,126,181,0.45) 0%,transparent 100%),
    radial-gradient(circle 0.9px at 37% 73%,rgba(110,232,176,0.4) 0%,transparent 100%),
    radial-gradient(circle 1.6px at 47% 54%,rgba(157,124,255,0.55) 0%,transparent 100%),
    radial-gradient(circle 0.7px at 57% 78%,rgba(255,255,255,0.45) 0%,transparent 100%),
    radial-gradient(circle 1.3px at 67% 60%,rgba(255,126,181,0.5) 0%,transparent 100%),
    radial-gradient(circle 1px at 77% 50%,rgba(157,124,255,0.45) 0%,transparent 100%),
    radial-gradient(circle 1.5px at 87% 70%,rgba(110,232,176,0.5) 0%,transparent 100%),
    radial-gradient(circle 0.8px at 94% 58%,rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(circle 1.1px at 7% 86%,rgba(255,126,181,0.45) 0%,transparent 100%),
    radial-gradient(circle 0.9px at 21% 93%,rgba(157,124,255,0.5) 0%,transparent 100%),
    radial-gradient(circle 1.4px at 41% 88%,rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(circle 0.7px at 61% 96%,rgba(110,232,176,0.4) 0%,transparent 100%),
    radial-gradient(circle 1.1px at 81% 90%,rgba(255,126,181,0.45) 0%,transparent 100%),
    radial-gradient(circle 1px at 96% 86%,rgba(157,124,255,0.5) 0%,transparent 100%);
  pointer-events:none;
  z-index:0;
}

/* ═══ CARD — 深空水晶 ═══ */
.card{
  max-width:1100px;
  margin:0 auto;
  background:
    radial-gradient(ellipse 400px 250px at 85% 8%,rgba(157,124,255,0.05) 0%,transparent 100%),
    radial-gradient(ellipse 250px 180px at 8% 92%,rgba(255,126,181,0.03) 0%,transparent 100%),
    linear-gradient(178deg,rgba(20,20,42,1) 0%,rgba(16,16,36,1) 100%);
  border-left:1px solid rgba(157,124,255,0.2);
  border-right:1px solid rgba(157,124,255,0.08);
  border-top:none;
  border-bottom:none;
  padding:44px 36px 0;
  position:relative;
  z-index:2;
}

.card>.footer{
  margin-top:24px;
  padding:20px 0 24px;
  position:relative;
}

.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,
    transparent 0%,
    var(--primary) 20%,
    var(--pink) 45%,
    var(--mint) 75%,
    transparent 100%
  );
  opacity:0.8;
}

.card::after{
  content:'';
  position:absolute;
  top:2px;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,0.1) 35%,
    rgba(255,255,255,0.18) 50%,
    rgba(255,255,255,0.1) 65%,
    transparent 100%
  );
}

/* ═══ HEADER — 标题栏 ═══ */
.header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:36px;
  padding-bottom:20px;
  position:relative;
}

.header::before{
  content:none;
}

.header::after{
  content:'';
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:160px;height:1px;
  background:linear-gradient(90deg,transparent,var(--primary),var(--pink),var(--primary),transparent);
  opacity:0.4;
}

.group-tag{
  display:inline-block;
  font-family:var(--sans);
  font-size:10px;
  font-weight:600;
  color:var(--primary);
  background:var(--primary-soft);
  border:1px solid var(--border-primary);
  border-radius:20px;
  padding:5px 16px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:16px;
}

.header h1{
  font-family:var(--sans);
  font-size:30px;
  font-weight:700;
  background:linear-gradient(135deg,var(--primary),var(--pink),var(--primary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:6px;
  text-transform:uppercase;
  margin-bottom:8px;
}

.header h1 .cursor{
  display:inline-block;
  font-size:20px;
  -webkit-text-fill-color:var(--pink);
  margin-left:4px;
  vertical-align:middle;
  text-shadow:0 0 12px var(--pink-glow);
}

.subtitle{
  font-size:11px;
  color:var(--text-dim);
  letter-spacing:3px;
  font-weight:400;
}

/* ═══ SECTION (standalone) ═══ */
.section{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px 16px 14px;
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
}

.section::before{
  content:'';
  position:absolute;
  top:0;left:0;
  width:3px;height:100%;
  background:linear-gradient(180deg,var(--primary),var(--pink),transparent);
  border-radius:16px 0 0 16px;
}

.section-title{
  font-family:var(--sans);
  font-size:12px;
  font-weight:600;
  color:var(--primary);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:16px;
  padding-bottom:12px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
}

.section-title .icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:24px;height:24px;
  background:var(--primary-soft);
  border:1px solid var(--border-primary);
  border-radius:8px;
  font-size:12px;
  flex-shrink:0;
  color:var(--primary);
}

/* ═══ SECTION BLOCK — 区块容器 ═══ */
.section-block{
  margin-bottom:16px;
  background:
    linear-gradient(135deg,rgba(157,124,255,0.03) 0%,transparent 60%),
    var(--surface-2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:22px 20px 18px;
  position:relative;
  overflow:hidden;
}

.section-block::before{
  content:'';
  position:absolute;
  top:0;left:0;
  width:3px;height:100%;
  background:linear-gradient(180deg,var(--primary),var(--pink),transparent 80%);
  border-radius:14px 0 0 14px;
  opacity:0.7;
}

/* ═══ VELOCITY LINE ═══ */
.velocity-svg{
  display:block;
  width:100%;
  overflow:visible;
}

/* ═══ METRIC ROW — 水晶指标卡片 ═══ */
.metric-row{
  display:flex;
  gap:12px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

.metric-box{
  flex:1;
  min-width:100px;
  background:
    linear-gradient(160deg,rgba(157,124,255,0.05) 0%,rgba(18,18,38,0.9) 100%);
  border:1px solid rgba(157,124,255,0.12);
  border-radius:12px;
  padding:16px 12px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.metric-box::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(180,142,255,0.3),var(--pink),rgba(180,142,255,0.3),transparent);
}

.metric-box::after{
  content:'';
  position:absolute;
  top:4px;right:4px;
  width:3px;height:3px;
  border-radius:50%;
  background:var(--primary);
  opacity:0.3;
}

.metric-value{
  font-family:var(--sans);
  font-size:28px;
  font-weight:700;
  color:var(--primary);
  line-height:1.1;
  margin-bottom:6px;
  text-shadow:0 0 20px var(--primary-glow);
}

.metric-value.pink{color:var(--pink);text-shadow:0 0 20px var(--pink-glow);}
.metric-value.mint{color:var(--mint);text-shadow:0 0 20px var(--mint-glow);}
.metric-value.coral{color:var(--pink);text-shadow:0 0 20px var(--pink-glow);}
.metric-value.teal{color:var(--mint);text-shadow:0 0 20px var(--mint-glow);}

.metric-label{
  font-size:9px;
  color:var(--text-dim);
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:500;
}

.metric-sub{
  font-size:10px;
  color:var(--text-muted);
  margin-top:4px;
  font-weight:400;
}

/* ═══ LEADERBOARD — 排行榜样式 ═══ */
.lb-entry{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}

.lb-entry:last-child{border-bottom:none;}

.lb-rank{
  font-family:var(--sans);
  font-size:18px;
  font-weight:700;
  min-width:36px;
  text-align:center;
  color:var(--text-muted);
}

.lb-rank.gold{color:var(--gold);text-shadow:0 0 10px rgba(255,217,102,0.3);}
.lb-rank.silver{color:#c0b8d8;}
.lb-rank.bronze{color:#e8a0b8;}

.lb-avatar{
  width:36px;height:36px;
  border-radius:50%;
  border:2px solid var(--border);
  object-fit:cover;
  flex-shrink:0;
}

.lb-avatar.gold{border-color:var(--gold);box-shadow:0 0 12px rgba(255,217,102,0.25);}
.lb-avatar.silver{border-color:#c0b8d8;}
.lb-avatar.bronze{border-color:#e8a0b8;}

.lb-name{
  font-size:13px;
  color:var(--text);
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-weight:500;
}

.lb-bar-wrap{
  flex:1;
  min-width:80px;
  max-width:200px;
  height:6px;
  background:var(--surface);
  border-radius:3px;
  overflow:hidden;
  position:relative;
}

.lb-bar{
  height:100%;
  border-radius:3px;
}

.lb-bar.gold{background:linear-gradient(90deg,var(--gold),#ffe680);box-shadow:0 0 8px rgba(255,217,102,0.35);}
.lb-bar.silver{background:linear-gradient(90deg,#8880a8,#c0b8d8);}
.lb-bar.bronze{background:linear-gradient(90deg,#c080a0,#e8a0b8);}
.lb-bar.normal{background:var(--text-muted);}

.lb-count{
  font-family:var(--sans);
  font-size:12px;
  color:var(--primary);
  min-width:50px;
  text-align:right;
  font-weight:600;
}

.lb-unit{
  font-size:9px;
  color:var(--text-muted);
  margin-left:2px;
}

/* ═══ RING CHART — 环形图表 ═══ */
.ring-container{
  display:flex;
  align-items:center;
  gap:24px;
  justify-content:center;
}

.ring-svg{flex-shrink:0;}

.ring-legend{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.ring-legend-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  color:var(--text-dim);
}

.ring-dot{
  width:8px;height:8px;
  border-radius:50%;
  flex-shrink:0;
  box-shadow:0 0 4px currentColor;
}

/* ═══ HOURLY HEATMAP — 每小时热力图 ═══ */
.heatmap-grid{
  display:grid;
  grid-template-columns:repeat(24,1fr);
  gap:3px;
}

.heatmap-cell{
  aspect-ratio:1;
  border-radius:6px;
  position:relative;
}

.heatmap-hour{
  text-align:center;
  font-size:7px;
  color:var(--text-muted);
  letter-spacing:0.5px;
  margin-top:4px;
}

.heatmap-labels{
  display:grid;
  grid-template-columns:repeat(24,1fr);
  gap:3px;
  margin-top:6px;
}

/* ═══ SENTIMENT BAR — 情绪条 ═══ */
.sentiment-bar{
  display:flex;
  height:20px;
  border-radius:10px;
  overflow:hidden;
  margin-top:8px;
}

.sentiment-pos{
  background:linear-gradient(90deg,var(--mint),#50e8a0);
  box-shadow:inset 0 0 10px rgba(125,255,194,0.2);
}

.sentiment-neutral{
  background:var(--text-muted);
}

.sentiment-neg{
  background:linear-gradient(90deg,#d060a0,var(--pink));
  box-shadow:inset 0 0 10px rgba(255,142,196,0.2);
}

/* ═══ SOCIAL PAIRS — 社交配对 ═══ */
.social-pair{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 0;
  border-bottom:1px solid var(--border);
}

.social-pair:last-child{border-bottom:none;}

.social-avatars{
  display:flex;
  align-items:center;
  gap:0;
  position:relative;
}

.social-avatar{
  width:28px;height:28px;
  border-radius:50%;
  border:2px solid var(--surface-2);
  object-fit:cover;
}

.social-avatar:last-child{margin-left:-10px;}

.social-arrow{
  font-size:10px;
  color:var(--primary);
  margin:0 4px;
  opacity:0.5;
}

.social-names{
  display:flex;
  align-items:center;
  gap:2px;
  font-size:11px;
  color:var(--text-dim);
  min-width:0;
  flex-shrink:1;
}

.social-names span{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:70px;
}

.social-unit{
  font-size:9px;
  color:var(--text-muted);
  margin-left:2px;
}

.social-bar-wrap{
  flex:1;
  height:5px;
  background:var(--surface);
  border-radius:3px;
  overflow:hidden;
}

.social-bar{
  height:100%;
  background:linear-gradient(90deg,var(--primary-soft),var(--primary));
  border-radius:3px;
}

.social-count{
  font-family:var(--sans);
  font-size:11px;
  color:var(--primary);
  min-width:30px;
  text-align:right;
  font-weight:600;
}

/* ═══ EVENTS — 事件卡片 ═══ */
.event-card{
  background:var(--surface-3);
  border:1px solid var(--border);
  border-left:3px solid var(--primary);
  border-radius:12px;
  padding:16px 18px;
  margin-bottom:10px;
}

.event-card:last-child{margin-bottom:0;}

.event-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.event-rank{
  font-family:var(--sans);
  font-size:9px;
  font-weight:700;
  color:var(--bg);
  background:linear-gradient(135deg,var(--primary),var(--pink));
  border-radius:8px;
  padding:3px 12px;
  letter-spacing:1px;
  flex-shrink:0;
  text-transform:uppercase;
}

.event-title{
  font-family:var(--sans);
  font-size:14px;
  font-weight:600;
  color:var(--text);
  letter-spacing:0.5px;
}

.event-meta{
  display:flex;
  gap:14px;
  font-family:var(--sans);
  font-size:10px;
  color:var(--text-muted);
  margin-bottom:8px;
  letter-spacing:0.5px;
}

.event-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:8px;
}

.event-tag{
  font-size:9px;
  font-weight:600;
  color:var(--primary);
  background:var(--primary-soft);
  border:1px solid var(--border-primary);
  border-radius:10px;
  padding:2px 10px;
  white-space:nowrap;
  letter-spacing:0.5px;
}

.event-flow{
  font-size:12px;
  line-height:1.9;
  color:var(--text-dim);
  padding:10px 14px;
  background:var(--surface);
  border-radius:10px;
  border:1px solid var(--border);
}

.event-samples{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.event-msg{
  display:flex;
  align-items:flex-start;
  gap:8px;
}

.event-msg-avatar{
  width:24px;height:24px;
  border-radius:50%;
  border:1.5px solid var(--border);
  object-fit:cover;
  flex-shrink:0;
}

.event-msg-content{flex:1;min-width:0;}

.event-msg-nick{
  font-size:10px;
  font-weight:600;
  color:var(--primary);
  margin-bottom:2px;
  display:block;
}

.event-msg-text{
  font-size:11px;
  color:var(--text-dim);
  line-height:1.5;
  word-wrap:break-word;
}

/* ═══ ECHOES — 复读金句样式 ═══ */
.echo-card{
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--surface-3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 14px;
  margin-bottom:8px;
  position:relative;
}

.echo-card::before{
  content:'';
  position:absolute;
  left:0;top:50%;
  transform:translateY(-50%);
  width:3px;height:60%;
  background:linear-gradient(180deg,var(--primary),var(--pink));
  border-radius:0 6px 6px 0;
  opacity:0.7;
}

.echo-rank{
  font-family:var(--sans);
  font-size:18px;
  font-weight:700;
  color:var(--primary);
  flex-shrink:0;
  min-width:28px;
  text-shadow:0 0 12px var(--primary-glow);
}

.echo-text{
  font-size:13px;
  color:var(--text);
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-style:italic;
  font-family:var(--cn);
}

.echo-meta{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}

.echo-count{
  font-family:var(--sans);
  font-size:9px;
  color:var(--pink);
  white-space:nowrap;
  letter-spacing:0.5px;
  font-weight:700;
}

.echo-avatars{
  display:flex;
  gap:2px;
}

.echo-avatar{
  width:20px;height:20px;
  border-radius:50%;
  border:1.5px solid var(--border);
  object-fit:cover;
  flex-shrink:0;
}

/* ═══ VOCAB — 词汇丰富度样式 ═══ */
.vocab-entry{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}

.vocab-entry:last-child{border-bottom:none;}

.vocab-name{
  font-size:12px;
  color:var(--text);
  min-width:80px;
  font-weight:500;
}

.vocab-bar-wrap{
  flex:1;
  height:8px;
  background:var(--surface);
  border-radius:4px;
  overflow:hidden;
  position:relative;
}

.vocab-bar{
  height:100%;
  border-radius:4px;
  background:linear-gradient(90deg,var(--mint),var(--mint-soft));
}

.vocab-ratio{
  font-family:var(--sans);
  font-size:12px;
  color:var(--mint);
  min-width:40px;
  text-align:right;
  font-weight:600;
}

.vocab-sig{
  font-size:10px;
  color:var(--text-muted);
  margin-top:4px;
  font-family:var(--cn);
}

/* ═══ WORD CLOUD — 词云样式 ═══ */
.word-cloud{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  padding:8px 0;
}

.word-cloud-tag{
  font-family:var(--cn);
  font-size:var(--wc-size,12px);
  color:var(--wc-color,var(--text-dim));
  padding:5px 14px;
  border:1px solid var(--wc-border,var(--border));
  border-radius:20px;
  background:var(--wc-bg,transparent);
  white-space:nowrap;
}

/* ═══ CONTENT MIX — 内容构成样式 ═══ */
.content-bars{
  display:flex;
  gap:8px;
  align-items:flex-end;
  height:80px;
  padding:0 20px;
  margin-bottom:8px;
}

.content-col{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  height:100%;
  justify-content:flex-end;
}

.content-bar{
  width:100%;
  border-radius:6px 6px 0 0;
  min-height:2px;
}

.content-bar-label{
  font-size:9px;
  color:var(--text-muted);
  text-align:center;
  letter-spacing:0.5px;
}

.content-bar-count{
  font-family:var(--sans);
  font-size:10px;
  color:var(--text-dim);
  font-weight:600;
}

/* ═══ COMMENTARY — 叙事摘要样式 ═══ */
.commentary{
  font-family:var(--cn);
  font-size:14px;
  line-height:2.2;
  color:var(--text-dim);
  letter-spacing:0.3px;
}

/* ═══ INLINE USER CARDS — 内联用户卡片 ═══ */
.inline-user-card{
  display:inline-flex;
  align-items:center;
  gap:4px;
  background:var(--primary-soft);
  border:1px solid var(--border-primary);
  border-radius:12px;
  padding:1px 8px 1px 3px;
  margin:0 2px;
  vertical-align:middle;
  white-space:nowrap;
}

.inline-avatar{
  width:18px;height:18px;
  border-radius:50%;
  border:1px solid var(--border-primary);
  object-fit:cover;
  flex-shrink:0;
}

.inline-name{
  font-size:11px;
  color:var(--primary);
  font-weight:600;
}

/* ═══ FOOTER — 页脚 ═══ */
.footer{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  font-family:var(--sans);
  font-size:9px;
  color:var(--text-muted);
  margin-top:36px;
  padding-top:20px;
  border-top:none;
  letter-spacing:2px;
  position:relative;
}

.footer::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,
    transparent 0%,
    var(--primary) 20%,
    var(--pink) 45%,
    var(--mint) 75%,
    transparent 100%
  );
  opacity:0.5;
}

.footer::before{
  content:none;
}

/* ═══ EMPTY STATE — 空状态 ═══ */
.empty-state{
  text-align:center;
  padding:24px;
  color:var(--text-muted);
  font-size:12px;
  letter-spacing:1px;
}

/* ═══ SECTIONS GRID — 三栏瀑布流布局 ═══ */
.sections-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.grid-col{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.grid-col>.section-block{
  margin-bottom:0;
}

.section-block.col-span-all{
  grid-column:1/-1;
}

.grid-spacer{
  flex-grow:1;
  border:1px solid rgba(157,124,255,0.06);
  border-radius:14px;
  background:
    radial-gradient(ellipse 120px 60px at 30% 35%,rgba(157,124,255,0.04) 0%,transparent 100%),
    radial-gradient(ellipse 80px 50px at 70% 65%,rgba(255,126,181,0.03) 0%,transparent 100%),
    rgba(26,26,52,0.3);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

.grid-spacer::before{
  content:'';
}

.grid-spacer::after{
  content:'';
  position:absolute;
  top:0;left:0;
  width:3px;height:100%;
  background:linear-gradient(180deg,transparent 20%,rgba(157,124,255,0.08) 50%,transparent 80%);
  border-radius:14px 0 0 14px;
}

@media(max-width:700px){
  .metric-row{flex-direction:column;}
  .sections-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="card">

  <!-- HEADER -->
  <div class="header">
    <h1>群聊脉搏报告</h1>
    <div class="subtitle">{{time_range}} · {{group_id}}</div>
  </div>

  <!-- HERO METRICS -->
  <div class="metric-row">
    {{hero_metrics_html}}
  </div>

  {{sections_grid_html}}

  <!-- FOOTER -->
  <div class="footer">
    <span>聊天分析器 v{{plugin_version}} · Sirius Chat</span>
    <span>生成于 {{generated_at}}</span>
  </div>

</div>
</body>
</html>
