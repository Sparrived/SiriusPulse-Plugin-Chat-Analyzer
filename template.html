<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fira+Code:wght@400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: linear-gradient(170deg, #0a0e1a 0%, #0d1526 25%, #111d33 50%, #0f1722 75%, #080c16 100%);
  color: #c8d6e5;
  padding: 0;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(1.5px 1.5px at 10% 15%, rgba(0,229,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 35%, rgba(0,229,255,0.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 35% 8%, rgba(255,183,77,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 55%, rgba(0,229,255,0.25) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 20%, rgba(255,183,77,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 70%, rgba(0,229,255,0.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 75% 30%, rgba(0,229,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 50%, rgba(255,183,77,0.25) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 90% 12%, rgba(0,229,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 80%, rgba(255,183,77,0.2) 0%, transparent 100%),
    radial-gradient(2px 2px at 50% 90%, rgba(0,229,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 65%, rgba(255,183,77,0.15) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 80% 85%, rgba(0,229,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 5% 45%, rgba(255,183,77,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 95% 60%, rgba(0,229,255,0.15) 0%, transparent 100%),
    radial-gradient(2px 2px at 40% 40%, rgba(0,229,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 95%, rgba(255,183,77,0.2) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 25% 5%, rgba(0,229,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 15%, rgba(255,183,77,0.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 78%, rgba(0,229,255,0.2) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

.card {
  max-width: 1100px;
  margin: 0 auto;
  background: rgba(10, 16, 30, 0.6);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(0, 229, 255, 0.1);
  border-top: none;
  padding: 32px 36px 28px;
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(0,229,255,0.1) 10%,
    rgba(0,229,255,0.8) 30%,
    #00E5FF 50%,
    rgba(0,229,255,0.8) 70%,
    rgba(0,229,255,0.1) 90%,
    transparent 100%
  );
}

/* ═══ HEADER ═══ */
.header {
  text-align: center;
  margin-bottom: 36px;
  padding-bottom: 28px;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,229,255,0.4), transparent);
}

.header h1 {
  font-family: 'Libre Baskerville', 'Noto Serif SC', Georgia, serif;
  font-size: 32px;
  font-weight: 700;
  color: #E8F0FE;
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 6px;
  text-shadow: 0 0 30px rgba(0,229,255,0.15);
}

.header .subtitle {
  font-family: 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  color: rgba(0,229,255,0.5);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* ═══ ROWS ═══ */
.row {
  display: grid;
  gap: 16px;
  margin-bottom: 16px;
  align-items: start;
}

.row-rankings {
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
}

.row-events, .row-bottom {
  grid-template-columns: 1fr;
}

/* ═══ SECTION CARDS (glass panels) ═══ */
.section {
  background: rgba(14, 22, 40, 0.5);
  border: 1px solid rgba(0, 229, 255, 0.08);
  border-radius: 16px;
  padding: 18px 16px 14px;
  position: relative;
  overflow: hidden;
}

.section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 5%, rgba(0,229,255,0.15) 30%, rgba(0,229,255,0.15) 70%, transparent 95%);
}

.section h2 {
  font-family: 'DM Sans', 'Microsoft YaHei', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: #00E5FF;
  margin-bottom: 14px;
  padding: 0 0 10px 14px;
  border-left: 3px solid #00E5FF;
  border-bottom: 1px solid rgba(0, 229, 255, 0.08);
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.section h2::before {
  content: '';
  position: absolute;
  left: 14px;
  top: 18px;
  width: 6px;
  height: 6px;
  background: #00E5FF;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(0,229,255,0.6);
}

/* ═══ RANKINGS ═══ */
.ranking {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.top-three {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 8px;
}

.rank-card {
  flex: 1;
  min-width: 70px;
  max-width: 150px;
  background: rgba(14, 22, 40, 0.6);
  border: 1px solid rgba(0, 229, 255, 0.1);
  border-radius: 14px;
  padding: 10px 6px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.rank-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: rgba(0,229,255,0.15);
}

.rank-card.gold {
  border-color: rgba(255, 183, 77, 0.4);
  background: linear-gradient(180deg, rgba(255,183,77,0.08) 0%, rgba(14,22,40,0.6) 100%);
}
.rank-card.gold::before { background: linear-gradient(90deg, transparent, #FFB74D, transparent); }

.rank-card.silver {
  border-color: rgba(176, 190, 210, 0.3);
  background: linear-gradient(180deg, rgba(176,190,210,0.06) 0%, rgba(14,22,40,0.6) 100%);
}
.rank-card.silver::before { background: linear-gradient(90deg, transparent, #B0BED2, transparent); }

.rank-card.bronze {
  border-color: rgba(205, 127, 50, 0.3);
  background: linear-gradient(180deg, rgba(205,127,50,0.06) 0%, rgba(14,22,40,0.6) 100%);
}
.rank-card.bronze::before { background: linear-gradient(90deg, transparent, #CD7F32, transparent); }

.rank-num {
  font-family: 'Fira Code', monospace;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

.rank-num.gold { color: #FFB74D; text-shadow: 0 0 12px rgba(255,183,77,0.3); }
.rank-num.silver { color: #B0BED2; }
.rank-num.bronze { color: #CD7F32; }

.rank-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 2px solid rgba(0,229,255,0.2);
  margin: 4px auto;
  object-fit: cover;
  box-shadow: 0 0 12px rgba(0,229,255,0.08);
}

.rank-avatar-default {
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,229,255,0.05));
  font-size: 16px;
}

.others-avatar-default {
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,229,255,0.05));
  font-size: 11px;
}

.rank-name {
  font-size: 11px;
  color: #a0b4cc;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.rank-count {
  font-family: 'Fira Code', monospace;
  font-size: 10px;
  color: rgba(0,229,255,0.5);
}

.others-list {
  background: rgba(10, 16, 30, 0.4);
  border-radius: 10px;
  padding: 6px 8px;
  border: 1px solid rgba(0, 229, 255, 0.05);
}

.others-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 11px;
  border-bottom: 1px solid rgba(0, 229, 255, 0.04);
}

.others-item:last-child { border-bottom: none; }

.others-item .rank {
  font-family: 'Fira Code', monospace;
  color: rgba(0,229,255,0.6);
  font-weight: 600;
  min-width: 26px;
}

.others-avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,229,255,0.15);
  margin: 0 6px;
  object-fit: cover;
}

.others-item .name { color: #8fa4be; flex: 1; }

.others-item .count {
  font-family: 'Fira Code', monospace;
  color: rgba(0,229,255,0.4);
}

/* ═══ EVENTS ═══ */
.events-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.event-card {
  background: rgba(14, 22, 40, 0.5);
  border: 1px solid rgba(0, 229, 255, 0.08);
  border-left: 3px solid rgba(0, 229, 255, 0.25);
  border-radius: 12px;
  padding: 12px 14px;
  position: relative;
}

.event-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.event-rank {
  font-family: 'Fira Code', monospace;
  font-size: 9px;
  font-weight: 600;
  color: #0a0e1a;
  background: #00E5FF;
  border-radius: 4px;
  padding: 3px 10px;
  letter-spacing: 1px;
  flex-shrink: 0;
  box-shadow: 0 0 12px rgba(0,229,255,0.3);
}

.event-title {
  font-size: 14px;
  font-weight: 600;
  color: #dce8f4;
  letter-spacing: 0.3px;
}

.event-meta-line {
  display: flex;
  gap: 12px;
  font-family: 'Fira Code', monospace;
  font-size: 10px;
  color: rgba(0,229,255,0.4);
  margin-bottom: 6px;
}

.event-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.event-tag {
  font-size: 9px;
  font-weight: 500;
  color: #00E5FF;
  background: rgba(0,229,255,0.06);
  border: 1px solid rgba(0,229,255,0.15);
  border-radius: 20px;
  padding: 2px 10px;
  white-space: nowrap;
  letter-spacing: 0.5px;
}

.event-flow {
  font-size: 12px;
  line-height: 1.8;
  color: #94a8c4;
  padding: 10px 12px;
  background: rgba(10, 16, 30, 0.5);
  border-radius: 8px;
  border: 1px solid rgba(0, 229, 255, 0.05);
}

.event-samples {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.event-msg {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.event-msg-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,229,255,0.15);
  object-fit: cover;
  flex-shrink: 0;
}

.event-msg-content {
  flex: 1;
  min-width: 0;
}

.event-msg-nick {
  font-size: 10px;
  font-weight: 600;
  color: #00E5FF;
  margin-bottom: 2px;
  display: block;
}

.event-msg-text {
  font-size: 11px;
  color: #7a92b0;
  line-height: 1.5;
  word-wrap: break-word;
  word-break: break-all;
}

/* ═══ ECHOES ═══ */
.echoes-container {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.echo-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(14, 22, 40, 0.5);
  border: 1px solid rgba(0, 229, 255, 0.06);
  border-radius: 10px;
  padding: 8px 12px;
  position: relative;
}

.echo-card::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 60%;
  background: rgba(0,229,255,0.2);
  border-radius: 0 2px 2px 0;
}

.echo-rank {
  font-family: 'Fira Code', monospace;
  font-size: 20px;
  font-weight: 600;
  color: #00E5FF;
  flex-shrink: 0;
  min-width: 28px;
  text-shadow: 0 0 16px rgba(0,229,255,0.3);
}

.echo-text {
  font-size: 13px;
  color: #b0c4de;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-style: italic;
}

.echo-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.echo-count {
  font-family: 'Fira Code', monospace;
  font-size: 9px;
  color: rgba(255,183,77,0.6);
  white-space: nowrap;
  letter-spacing: 0.5px;
}

.echo-avatars {
  display: flex;
  gap: 3px;
}

.echo-avatar-wrap {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,229,255,0.15);
  overflow: hidden;
  flex-shrink: 0;
}

.echo-avatar {
  width: 100%; height: 100%;
  object-fit: cover;
}

/* ═══ HOURLY ACTIVITY ═══ */
.hourly-section {
  background: rgba(14, 22, 40, 0.5);
  border: 1px solid rgba(0, 229, 255, 0.08);
  border-radius: 16px;
  padding: 18px 16px 14px;
  position: relative;
  overflow: hidden;
}

.hourly-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 5%, rgba(0,229,255,0.15) 30%, rgba(0,229,255,0.15) 70%, transparent 95%);
}

.hourly-section h2 {
  font-family: 'DM Sans', 'Microsoft YaHei', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: #00E5FF;
  margin-bottom: 14px;
  padding: 0 0 10px 14px;
  border-left: 3px solid #00E5FF;
  border-bottom: 1px solid rgba(0, 229, 255, 0.08);
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.hourly-section h2::before {
  content: '';
  position: absolute;
  left: 14px;
  top: 18px;
  width: 6px;
  height: 6px;
  background: #00E5FF;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(0,229,255,0.6);
}

.hourly-peeps {
  display: flex;
  gap: 0;
  align-items: flex-end;
  margin-bottom: 4px;
  min-height: 38px;
}

.hourly-peep {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  gap: 2px;
  overflow: hidden;
}

.hourly-peep-avatar {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,229,255,0.2);
  object-fit: cover;
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(0,229,255,0.1);
}

.hourly-peep-name {
  font-size: 7px;
  color: rgba(0,229,255,0.35);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  text-align: center;
  line-height: 1.1;
}

.hourly-bar {
  display: flex;
  gap: 0;
  align-items: stretch;
  height: 28px;
  margin-bottom: 6px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(0,229,255,0.06);
}

.hourly-col {
  transition: opacity 0.2s, filter 0.2s;
}

.hourly-col:hover {
  opacity: 0.8;
  filter: brightness(1.3);
}

.hourly-labels {
  display: flex;
  justify-content: space-between;
  font-family: 'Fira Code', monospace;
  font-size: 8px;
  color: rgba(0,229,255,0.25);
  letter-spacing: 0.5px;
}

/* ═══ COMMENTARY ═══ */
.commentary-section {
  background: rgba(14, 22, 40, 0.5);
  border: 1px solid rgba(255, 183, 77, 0.12);
  border-radius: 16px;
  padding: 18px 16px 14px;
  position: relative;
  overflow: hidden;
}

.commentary-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 5%, rgba(255,183,77,0.2) 30%, rgba(255,183,77,0.2) 70%, transparent 95%);
}

.commentary-section h2 {
  font-family: 'DM Sans', 'Microsoft YaHei', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: #FFB74D;
  margin-bottom: 14px;
  padding: 0 0 10px 14px;
  border-left: 3px solid #FFB74D;
  border-bottom: 1px solid rgba(255, 183, 77, 0.1);
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.commentary-section h2::before {
  content: '';
  position: absolute;
  left: 14px;
  top: 18px;
  width: 6px;
  height: 6px;
  background: #FFB74D;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(255,183,77,0.5);
}

.commentary {
  font-size: 13px;
  line-height: 2;
  color: #a0b4cc;
  letter-spacing: 0.3px;
}

.commentary .name {
  color: #00E5FF;
  font-weight: 600;
}

/* ═══ INLINE USER CARDS (in commentary) ═══ */
.inline-user-card {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(0, 229, 255, 0.06);
  border: 1px solid rgba(0, 229, 255, 0.12);
  border-radius: 20px;
  padding: 1px 8px 1px 3px;
  margin: 0 2px;
  vertical-align: middle;
  white-space: nowrap;
}

.inline-avatar {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid rgba(0,229,255,0.2);
  object-fit: cover;
  flex-shrink: 0;
}

.inline-name {
  font-size: 11px;
  color: #00E5FF;
  font-weight: 600;
}

/* ═══ FOOTER ═══ */
.footer {
  text-align: center;
  font-family: 'Fira Code', monospace;
  font-size: 10px;
  color: rgba(0,229,255,0.2);
  margin-top: 28px;
  padding-top: 16px;
  border-top: 1px solid rgba(0,229,255,0.06);
  letter-spacing: 1.5px;
}

.footer span {
  color: rgba(0,229,255,0.15);
}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>✦ Chat Observatory ✦</h1>
    <div class="subtitle">{{group_name}} · {{group_id}} · {{time_range}}</div>
  </div>

  <!-- 排名区 -->
  <div class="row row-rankings">
    {{rankings_html}}
  </div>

  <!-- 热门事件 -->
  <div class="row row-events">
    {{events_html}}
  </div>

  <!-- 复读金句 -->
  <div class="row row-events">
    {{echoes_html}}
  </div>

  <!-- 时段活跃度 -->
  <div class="row row-events">
    <div class="hourly-section">
      <h2>◈ 时段活跃度</h2>
      <div class="hourly-peeps">{{hourly_peeps}}</div>
      <div class="hourly-bar">{{hourly_bars}}</div>
      <div class="hourly-labels">{{hourly_labels}}</div>
    </div>
  </div>

  <!-- 群聊总结 -->
  <div class="row row-events">
    <div class="commentary-section">
      <h2>◈ 群聊总结</h2>
      <div class="commentary">{{commentary_html}}</div>
    </div>
  </div>

  <div class="footer">
    <span>ChatAnalyzer v{{plugin_version}}</span> · <span>Sirius Chat</span>
    <br><span>Generated {{generated_at}}</span>
  </div>
</div>
</body>
</html>
